name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (build, vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"; echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  typescript:
    name: TypeScript (workspace build, typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      # Build before typecheck: examples consume @emdzej/swsrs-client via the
      # workspace link, which points at its dist/ for `types`. The build step
      # itself typechecks (tsc fails on type errors), so this single pass is
      # the full check.
      - name: build (all packages)
        run: pnpm -r run build

      - name: pack client (dry-run)
        working-directory: clients/typescript
        run: pnpm pack --dry-run

  smoke:
    name: End-to-end smoke (relay + chat)
    runs-on: ubuntu-latest
    needs: [go, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: smoke
        run: bash scripts/smoke-chat.sh
